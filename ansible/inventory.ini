# File: ansible/inventory.ini
# Ansible inventory for the EC2 instance
# IMPORTANT: Replace 10.0.1.100 with the actual EC2 public IP from terraform output

[k8s_master]
ec2_instance ansible_host=10.0.1.100 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/online-boutique.pem

[k8s_master:vars]
ansible_python_interpreter=/usr/bin/python3

# After terraform apply, get the IP:
# terraform output ec2_public_ip
# Then update the IP above


name: Build and Deploy Online Boutique

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - '.github/workflows/deploy.yml'
  
  workflow_dispatch:

env:
  REGISTRY: docker.io
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: frontend
            dockerfile: ./src/frontend/Dockerfile
          - service: adservice
            dockerfile: ./src/adservice/Dockerfile
          - service: cartservice
            dockerfile: ./src/cartservice/src/Dockerfile # Specific path for .NET
          - service: checkoutservice
            dockerfile: ./src/checkoutservice/Dockerfile
          - service: currencyservice
            dockerfile: ./src/currencyservice/Dockerfile
          - service: emailservice
            dockerfile: ./src/emailservice/Dockerfile
          - service: paymentservice
            dockerfile: ./src/paymentservice/Dockerfile
          - service: productcatalogservice
            dockerfile: ./src/productcatalogservice/Dockerfile
          - service: recommendationservice
            dockerfile: ./src/recommendationservice/Dockerfile
          - service: shippingservice
            dockerfile: ./src/shippingservice/Dockerfile
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}
      
      - name: Extract metadata for ${{ matrix.service }}
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: |
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_HUB_USERNAME }}/online-boutique-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest
      
      - name: Build and push Docker image for ${{ matrix.service }}
        uses: docker/build-push-action@v4
        with:
          context: ./src/${{ matrix.context }}
          file: ./src/${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ secrets.DOCKER_HUB_USERNAME }}/online-boutique-${{ matrix.service }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ secrets.DOCKER_HUB_USERNAME }}/online-boutique-${{ matrix.service }}:buildcache,mode=max
      
      - name: Update Kubernetes manifests with new image tag
        run: |
          # Get the image tag (usually 'latest' or git sha)
          IMAGE_TAG="${{ steps.meta.outputs.version }}"
          if [ -z "$IMAGE_TAG" ]; then
            IMAGE_TAG="latest"
          fi
          
          # Update all references in Kubernetes manifests
          find kubernetes/ -name "*.yaml" -type f -exec sed -i \
            "s|${{ env.REGISTRY }}/${{ secrets.DOCKER_HUB_USERNAME }}/online-boutique-${{ matrix.service }}:.*|${{ env.REGISTRY }}/${{ secrets.DOCKER_HUB_USERNAME }}/online-boutique-${{ matrix.service }}:${IMAGE_TAG}|g" {} \;
      
      - name: Commit and push updated manifests
        if: success()
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # Check if there are changes
          if git diff --quiet; then
            echo "No changes to commit"
          else
            git add kubernetes/
            git commit -m "Update Kubernetes manifests for ${{ matrix.service }} - $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          fi
      
      - name: Notify deployment
        if: success()
        run: |
          echo "✅ Successfully built and pushed image for ${{ matrix.service }}"
          echo "📝 Kubernetes manifests updated"
          echo "🚀 ArgoCD will automatically sync with the updated manifests"

  notify:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Deployment Summary
        run: |
          echo "=== Deployment Pipeline Complete ==="
          echo "Status: ${{ needs.build-and-push.result }}"
          echo "All microservices have been built and manifests updated"
          echo "Check ArgoCD dashboard for sync status"


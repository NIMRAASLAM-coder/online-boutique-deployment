# File: kubernetes/cartservice.yaml
# CartService - handles shopping cart operations

---
apiVersion: v1
kind: Service
metadata:
  name: cartservice
  namespace: boutique
  labels:
    app: cartservice
spec:
  type: ClusterIP  # Internal service only
  ports:
  - name: grpc
    port: 7070
    targetPort: 7070
    protocol: TCP
  selector:
    app: cartservice

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cartservice
  namespace: boutique
  labels:
    app: cartservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cartservice
  template:
    metadata:
      labels:
        app: cartservice
    spec:
      containers:
      - name: cartservice
        image: YOUR-DOCKER-HUB-USERNAME/online-boutique-cartservice:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 7070
          name: grpc
        
        env:
        - name: REDIS_ADDR
          value: "redis-cart:6379"
        - name: PORT
          value: "7070"
        - name: LISTEN_ADDR
          value: "0.0.0.0"
        
        resources:
          requests:
            cpu: 200m
            memory: 64Mi
          limits:
            cpu: 300m
            memory: 128Mi
        
        livenessProbe:
          grpc:
            port: 7070
          initialDelaySeconds: 15
          periodSeconds: 10
        
        readinessProbe:
          grpc:
            port: 7070
          initialDelaySeconds: 15
          periodSeconds: 5

---
# Redis for cart service
apiVersion: v1
kind: Service
metadata:
  name: redis-cart
  namespace: boutique
  labels:
    app: redis-cart
spec:
  type: ClusterIP
  ports:
  - name: tcp
    port: 6379
    targetPort: 6379
  selector:
    app: redis-cart

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-cart
  namespace: boutique
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-cart
  template:
    metadata:
      labels:
        app: redis-cart
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        volumeMounts:
        - mountPath: /data
          name: redis-data
      volumes:
      - name: redis-data
        emptyDir: {}


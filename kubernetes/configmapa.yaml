# File: kubernetes/configmap.yaml
# ConfigMap stores non-sensitive configuration data for the application
# Services will read from this ConfigMap

apiVersion: v1
kind: ConfigMap
metadata:
  name: online-boutique-config
  namespace: boutique
data:
  # Frontend configuration
  FRONTEND_ADDR: "0.0.0.0:3000"
  
  # Backend service addresses (using Kubernetes service discovery)
  CART_SERVICE_ADDR: "cartservice:7070"
  PRODUCT_CATALOG_SERVICE_ADDR: "productcatalogservice:3550"
  CHECKOUT_SERVICE_ADDR: "checkoutservice:5050"
  SHIPPING_SERVICE_ADDR: "shippingservice:50051"
  PAYMENT_SERVICE_ADDR: "paymentservice:50051"
  EMAIL_SERVICE_ADDR: "emailservice:5000"
  CURRENCY_SERVICE_ADDR: "currencyservice:7000"
  RECOMMENDATION_SERVICE_ADDR: "recommendationservice:8080"
  AD_SERVICE_ADDR: "adservice:9090"
  ORDERING_SERVICE_ADDR: "orderingservice:7070"
  
  # Log level
  LOG_LEVEL: "info"
  
  # Feature flags
  ENABLE_PROFILER: "false"
  ENABLE_STATS: "true"
  ENABLE_TRACING: "false"


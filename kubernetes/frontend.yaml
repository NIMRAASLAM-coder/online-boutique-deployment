---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: boutique
  labels:
    app: frontend
spec:
  type: LoadBalancer
  ports:
  - name: http
    port: 80
    targetPort: 3000
    protocol: TCP
  selector:
    app: frontend
  sessionAffinity: None

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: boutique
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: gcr.io/google-samples/microservices-demo/frontend:v0.3.9
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: LOG_LEVEL
          value: "info"
        - name: FRONTEND_ADDR
          value: "0.0.0.0:3000"
        - name: AD_SERVICE_ADDR
          value: "adservice:9090"
        - name: CART_SERVICE_ADDR
          value: "cartservice:7070"
        - name: CHECKOUT_SERVICE_ADDR
          value: "checkoutservice:5050"
        - name: CURRENCY_SERVICE_ADDR
          value: "currencyservice:7000"
        - name: PRODUCT_CATALOG_SERVICE_ADDR
          value: "productcatalogservice:3550"
        - name: RECOMMENDATION_SERVICE_ADDR
          value: "recommendationservice:8080"
        - name: SHIPPING_SERVICE_ADDR
          value: "shippingservice:50051"
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
